<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal DDT</title>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#14171c;
    --panel-2:#1c2028;
    --line:#262b33;
    --text:#e9edf2;
    --muted:#8b93a1;
    --accent:#ff4e3a;
    --accent-2:#33e29a;
    --shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  body.light{
    --bg:#f7f7f9;
    --panel:#ffffff;
    --panel-2:#f0f1f4;
    --line:#e3e5ea;
    --text:#14171c;
    --muted:#6b7280;
    --shadow: 0 8px 24px rgba(20,23,28,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Segoe UI', system-ui, sans-serif;
    transition:background .25s ease, color .25s ease;
  }
  header{
    padding:16px 20px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:10;
  }
  .brand{
    display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;
    cursor:pointer; background:none; border:none; padding:0;
  }
  .brand h1{ margin:0; font-size:20px; }
  .brand h1 span{ color:var(--accent); }
  .brand:hover h1 span{ text-shadow:0 0 14px var(--accent); }

  .header-right{ display:flex; align-items:center; gap:6px; }
  nav{ display:flex; }
  nav a{
    color:var(--muted); text-decoration:none; font-size:13px; font-weight:600;
    margin-left:18px; transition:color .15s ease;
  }
  nav a:hover{ color:var(--accent); }

  .theme-toggle{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); display:flex; align-items:center;
    justify-content:center; cursor:pointer; margin-left:16px; flex-shrink:0;
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .theme-toggle:hover{ box-shadow:0 0 16px rgba(255,183,3,0.45); transform:translateY(-1px); }
  .theme-toggle svg{ width:17px; height:17px; }

  section{ padding:36px 20px; max-width:960px; margin:0 auto; }
  .eyebrow-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .icon-badge{
    width:30px; height:30px; border-radius:9px; display:flex; align-items:center;
    justify-content:center; background:var(--panel-2); border:1px solid var(--line);
    flex-shrink:0;
  }
  .icon-badge svg{ width:16px; height:16px; }
  .icon-badge.glow-accent{ box-shadow:0 0 18px -2px rgba(255,78,58,0.55); border-color:rgba(255,78,58,0.4); color:var(--accent); }
  .icon-badge.glow-green{ box-shadow:0 0 18px -2px rgba(51,226,154,0.5); border-color:rgba(51,226,154,0.4); color:var(--accent-2); }
  .icon-badge.glow-gold{ box-shadow:0 0 18px -2px rgba(255,183,3,0.5); border-color:rgba(255,183,3,0.4); color:#ffb703; }
  .icon-badge.bounce svg{ animation:bounce 1.8s ease-in-out infinite; }
  @keyframes bounce{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(3px); } }

  .eyebrow{
    color:var(--accent); font-size:12px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase;
  }
  h2{ font-size:22px; margin:0 0 18px; }

  .grid{ display:grid; gap:16px; grid-template-columns:1fr; }
  @media(min-width:640px){ .grid{ grid-template-columns:1fr 1fr; } }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; box-shadow:var(--shadow); transition:transform .18s ease, box-shadow .18s ease;
  }
  .card[data-clickable]{ cursor:pointer; }
  .card[data-clickable]:hover{ transform:translateY(-3px); box-shadow:0 10px 30px -4px rgba(255,78,58,0.35); }
  .card img{ width:100%; height:160px; object-fit:cover; display:block; }
  .card .body{ padding:14px 16px; }
  .card h3{ margin:0 0 6px; font-size:15px; }
  .card p{ margin:0; color:var(--muted); font-size:13px; line-height:1.5; }
  .card .tag{ color:var(--accent-2); font-size:11px; font-weight:700; text-transform:uppercase; }

  .dl-item{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .dl-item:hover{ transform:translateY(-2px); box-shadow:0 10px 26px -6px rgba(51,226,154,0.35); }
  .dl-item h3{ margin:0 0 4px; font-size:14px; }
  .dl-item p{ margin:0; color:var(--muted); font-size:12px; }
  .dl-item a{
    background:var(--accent); color:#1a0a06; text-decoration:none; font-weight:700;
    font-size:12px; padding:8px 14px; border-radius:8px; flex-shrink:0;
    box-shadow:0 4px 14px -2px rgba(255,78,58,0.55);
  }

  .empty{ color:var(--muted); font-size:13px; }

  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
    z-index:50; align-items:flex-start; justify-content:center; padding:20px 14px;
    overflow-y:auto;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    max-width:640px; width:100%; margin-top:30px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-box img{ width:100%; max-height:280px; object-fit:cover; display:block; }
  .modal-box .body{ padding:20px; }
  .modal-box .tag{ color:var(--accent-2); font-size:11px; font-weight:700; text-transform:uppercase; }
  .modal-box h2{ font-size:19px; margin:8px 0 14px; }
  .modal-box .texto{ color:var(--text); font-size:14px; line-height:1.7; white-space:pre-wrap; }
  .modal-close{
    display:block; margin:16px 20px 20px auto; background:var(--panel-2);
    border:1px solid var(--line); color:var(--text); padding:9px 16px;
    border-radius:8px; font-size:13px; cursor:pointer;
  }

  footer{ text-align:center; padding:30px; color:var(--muted); font-size:12px; border-top:1px solid var(--line); }
</style>
</head>
<body id="top">

<header>
  <a class="brand" href="#top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
    <h1>Portal <span>DDT</span></h1>
  </a>
  <div class="header-right">
    <nav>
      <a href="#promocoes">Ofertas</a>
      <a href="#downloads">Downloads</a>
      <a href="#materias">Matérias</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle" onclick="alternarTema()" aria-label="Alternar tema claro/escuro">
      <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
  </div>
</header>

<section id="promocoes">
  <div class="eyebrow-row">
    <div class="icon-badge glow-accent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>
    </div>
    <div class="eyebrow">Ofertas</div>
  </div>
  <h2>Promoções em destaque</h2>
  <div class="grid" id="grid-promocoes"><p class="empty">Carregando...</p></div>
</section>

<section id="downloads">
  <div class="eyebrow-row">
    <div class="icon-badge glow-green bounce">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M6 12l6 6 6-6"/><path d="M5 21h14"/></svg>
    </div>
    <div class="eyebrow" style="color:var(--accent-2)">Downloads</div>
  </div>
  <h2>Arquivos disponíveis</h2>
  <div id="lista-downloads"><p class="empty">Carregando...</p></div>
</section>

<section id="materias">
  <div class="eyebrow-row">
    <div class="icon-badge glow-gold">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3h8a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V5a2 2 0 0 1 2-2z"/><path d="M9 8h6"/><path d="M9 12h6"/></svg>
    </div>
    <div class="eyebrow" style="color:#ffb703">Matérias</div>
  </div>
  <h2>Últimas publicações</h2>
  <div class="grid" id="grid-materias"><p class="empty">Carregando...</p></div>
</section>

<footer>Portal DDT</footer>

<div class="modal-overlay" id="modal-materia" onclick="fecharModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img id="modal-img" src="" alt="" style="display:none">
    <div class="body">
      <div class="tag" id="modal-categoria" style="display:none"></div>
      <h2 id="modal-titulo"></h2>
      <div class="texto" id="modal-texto"></div>
    </div>
    <button class="modal-close" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://snvkfftvzzcturktxzzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_C2icDBNskUgvLt-JOr8z9g_dzPZczJl";

  const SOL = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.9 4.9l1.4 1.4"/><path d="M17.7 17.7l1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.9 19.1l1.4-1.4"/><path d="M17.7 6.3l1.4-1.4"/>';
  const LUA = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';

  function aplicarIconeTema(){
    const icon = document.getElementById('theme-icon');
    const claro = document.body.classList.contains('light');
    icon.innerHTML = claro ? LUA : SOL;
  }
  function alternarTema(){
    document.body.classList.toggle('light');
    aplicarIconeTema();
  }
  aplicarIconeTema();

  function extrairThumbYoutube(url){
    if(!url) return url;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([a-zA-Z0-9_-]{11})/);
    return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : url;
  }

  let materiasCache = [];
  function abrirMateria(i){
    const r = materiasCache[i];
    const img = document.getElementById('modal-img');
    if(r.imagem_url){ img.src = extrairThumbYoutube(r.imagem_url); img.style.display='block'; }
    else { img.style.display='none'; }
    const tag = document.getElementById('modal-categoria');
    if(r.categoria){ tag.textContent = r.categoria; tag.style.display='block'; }
    else { tag.style.display='none'; }
    document.getElementById('modal-titulo').textContent = r.titulo;
    document.getElementById('modal-texto').textContent = r.conteudo || '';
    document.getElementById('modal-materia').classList.add('open');
  }
  function fecharModal(){
    document.getElementById('modal-materia').classList.remove('open');
  }

  async function api(path){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    if(!res.ok) throw new Error('Falha ao buscar dados');
    return res.json();
  }

  async function carregarPromocoes(){
    const el = document.getElementById('grid-promocoes');
    try{
      const rows = await api('promocoes?select=*&order=created_at.desc&limit=6');
      if(!rows.length){ el.innerHTML = '<p class="empty">Nenhuma promoção no momento.</p>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="card">
          ${r.imagem_url ? `<img src="${extrairThumbYoutube(r.imagem_url)}" alt="">` : ''}
          <div class="body">
            <h3>${r.titulo}</h3>
            <p>${r.descricao || ''}</p>
          </div>
        </div>
      `).join('');
    } catch(e){ el.innerHTML = '<p class="empty">Não foi possível carregar as promoções.</p>'; }
  }

  async function carregarDownloads(){
    const el = document.getElementById('lista-downloads');
    try{
      const rows = await api('downloads?select=*&order=created_at.desc&limit=12');
      if(!rows.length){ el.innerHTML = '<p class="empty">Nenhum download disponível.</p>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="dl-item">
          <div>
            <h3>${r.titulo}</h3>
            <p>${r.descricao || ''}</p>
          </div>
          <a href="${r.link_telegram}" target="_blank" rel="noopener">Baixar</a>
        </div>
      `).join('');
    } catch(e){ el.innerHTML = '<p class="empty">Não foi possível carregar os downloads.</p>'; }
  }

  async function carregarMaterias(){
    const el = document.getElementById('grid-materias');
    try{
      const rows = await api('materias?select=*&order=created_at.desc&limit=6');
      if(!rows.length){ el.innerHTML = '<p class="empty">Nenhuma matéria publicada.</p>'; return; }
      materiasCache = rows;
      el.innerHTML = rows.map((r, i) => `
        <div class="card" data-clickable onclick="abrirMateria(${i})">
          ${r.imagem_url ? `<img src="${extrairThumbYoutube(r.imagem_url)}" alt="">` : ''}
          <div class="body">
            ${r.categoria ? `<div class="tag">${r.categoria}</div>` : ''}
            <h3>${r.titulo}</h3>
            <p>${(r.conteudo || '').slice(0,120)}</p>
          </div>
        </div>
      `).join('');
    } catch(e){ el.innerHTML = '<p class="empty">Não foi possível carregar as matérias.</p>'; }
  }

  carregarPromocoes();
  carregarDownloads();
  carregarMaterias();
</script>
</body>
</html>
