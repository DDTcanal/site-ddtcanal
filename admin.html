<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DDT Painel</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22DDT%20Painel%22%2C%22short_name%22%3A%22DDT%20Painel%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b0d10%22%2C%22theme_color%22%3A%22%230b0d10%22%7D">
<style>
  :root{
    --bg:#0b0d10;
    --panel:#14171c;
    --panel-2:#1c2028;
    --line:#262b33;
    --text:#e9edf2;
    --muted:#8b93a1;
    --accent:#ff4e3a;
    --accent-2:#33e29a;
    --font-display: 'Segoe UI', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--font-display); padding-bottom:80px;
  }
  header{
    padding:20px 18px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--bg); z-index:10;
  }
  header h1{
    margin:0; font-size:20px; letter-spacing:0.5px;
  }
  header h1 span{ color:var(--accent); }
  header p{ margin:4px 0 0; color:var(--muted); font-size:13px; }

  nav{ display:flex; gap:8px; padding:14px 18px 0; }
  nav button{
    flex:1; padding:10px 6px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-size:13px; font-weight:600;
    cursor:pointer;
  }
  nav button.active{
    background:var(--accent); color:#1a0a06; border-color:var(--accent);
  }

  main{ padding:18px; }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin-bottom:14px;
  }
  label{ display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
  label:first-child{ margin-top:0; }
  input, textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--line);
    border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px;
    font-family:inherit;
  }
  textarea{ min-height:90px; resize:vertical; }
  .btn{
    width:100%; margin-top:16px; padding:13px; border-radius:10px; border:none;
    background:var(--accent); color:#1a0a06; font-weight:700; font-size:14px;
    cursor:pointer;
  }
  .btn:disabled{ opacity:0.5; }
  .msg{ font-size:13px; margin-top:10px; min-height:16px; }
  .msg.ok{ color:var(--accent-2); }
  .msg.err{ color:var(--accent); }

  .item{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:10px; padding:12px 0; border-bottom:1px solid var(--line);
  }
  .item:last-child{ border-bottom:none; }
  .item h3{ margin:0 0 4px; font-size:14px; }
  .item p{ margin:0; font-size:12px; color:var(--muted); }
  .del{
    background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; flex-shrink:0;
  }
  .del:hover{ color:var(--accent); border-color:var(--accent); }

  .lock{
    position:fixed; inset:0; background:var(--bg); display:flex;
    align-items:center; justify-content:center; flex-direction:column; z-index:100;
    padding:24px;
  }
  .lock input{ text-align:center; letter-spacing:4px; font-size:20px; }
  .lock h2{ font-size:18px; margin-bottom:18px; }
  .lock .btn{ max-width:280px; }
  .lock-box{ width:100%; max-width:280px; }
</style>
</head>
<body>

<div id="lock" class="lock">
  <h2>Portal <span style="color:var(--accent)">DDT</span> — Painel</h2>
  <div class="lock-box">
    <input id="pin" type="password" placeholder="Senha do painel" inputmode="numeric">
    <button class="btn" onclick="tryUnlock()">Entrar</button>
    <p class="msg err" id="lockMsg"></p>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Portal <span>DDT</span></h1>
    <p>Painel de conteúdo</p>
  </header>

  <nav>
    <button class="tab active" data-tab="promocoes">Promoções</button>
    <button class="tab" data-tab="materias">Matérias</button>
    <button class="tab" data-tab="downloads">Downloads</button>
  </nav>

  <main>
    <!-- PROMOÇÕES -->
    <section id="tab-promocoes">
      <div class="card">
        <label>Título</label>
        <input id="p_titulo" placeholder="Ex: Placa de vídeo com 30% off">
        <label>Descrição</label>
        <textarea id="p_descricao" placeholder="Detalhes da promoção"></textarea>
        <label>URL da imagem (opcional)</label>
        <input id="p_imagem" placeholder="https://...">
        <button class="btn" onclick="publicar('promocoes')">Publicar promoção</button>
        <p class="msg" id="msg_promocoes"></p>
      </div>
      <div class="card"><div id="list_promocoes">Carregando...</div></div>
    </section>

    <!-- MATÉRIAS -->
    <section id="tab-materias" style="display:none">
      <div class="card">
        <label>Título</label>
        <input id="m_titulo" placeholder="Ex: Review: Novo Teclado Mecânico">
        <label>Categoria</label>
        <input id="m_categoria" placeholder="Ex: Tecnologia, Games">
        <label>Conteúdo</label>
        <textarea id="m_conteudo" placeholder="Texto da matéria"></textarea>
        <label>URL da imagem (opcional)</label>
        <input id="m_imagem" placeholder="https://...">
        <button class="btn" onclick="publicar('materias')">Publicar matéria</button>
        <p class="msg" id="msg_materias"></p>
      </div>
      <div class="card"><div id="list_materias">Carregando...</div></div>
    </section>

    <!-- DOWNLOADS -->
    <section id="tab-downloads" style="display:none">
      <div class="card">
        <label>Título</label>
        <input id="d_titulo" placeholder="Ex: Pacote de Drivers 2026">
        <label>Descrição</label>
        <textarea id="d_descricao" placeholder="O que tem no arquivo"></textarea>
        <label>Link do Telegram</label>
        <input id="d_link" placeholder="https://t.me/...">
        <button class="btn" onclick="publicar('downloads')">Publicar download</button>
        <p class="msg" id="msg_downloads"></p>
      </div>
      <div class="card"><div id="list_downloads">Carregando...</div></div>
    </section>
  </main>
</div>

<script>
  // ====== CONFIGURAÇÃO — cole aqui os dados do seu projeto Supabase ======
  const SUPABASE_URL = "https://snvkfftvzzcturktxzzv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publbishable_C2icDBNskUgvLt-JOr8z9g_dzPZczJl";
  const PAINEL_SENHA = "19079403"; // senha para abrir o painel
  // ==========================================================================

  function tryUnlock(){
    const val = document.getElementById('pin').value;
    if(val === PAINEL_SENHA){
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      sessionStorage.setItem('ddt_unlocked','1');
      carregarTudo();
    } else {
      document.getElementById('lockMsg').textContent = 'Senha incorreta.';
    }
  }
  if(sessionStorage.getItem('ddt_unlocked') === '1'){
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('main > section').forEach(s=>s.style.display='none');
      document.getElementById('tab-'+btn.dataset.tab).style.display='block';
    });
  });

  async function api(path, options={}){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers||{})
      }
    });
    if(!res.ok){ throw new Error(await res.text()); }
    return res.status === 204 ? null : res.json();
  }

  async function publicar(tabela){
    const msgEl = document.getElementById('msg_'+tabela);
    msgEl.className = 'msg'; msgEl.textContent = 'Publicando...';
    let body = {};
    try{
      if(tabela === 'promocoes'){
        body = {
          titulo: document.getElementById('p_titulo').value,
          descricao: document.getElementById('p_descricao').value,
          imagem_url: document.getElementById('p_imagem').value
        };
      } else if(tabela === 'materias'){
        body = {
          titulo: document.getElementById('m_titulo').value,
          categoria: document.getElementById('m_categoria').value,
          conteudo: document.getElementById('m_conteudo').value,
          imagem_url: document.getElementById('m_imagem').value
        };
      } else if(tabela === 'downloads'){
        body = {
          titulo: document.getElementById('d_titulo').value,
          descricao: document.getElementById('d_descricao').value,
          link_telegram: document.getElementById('d_link').value
        };
      }
      if(!body.titulo){ throw new Error('Preencha o título.'); }
      await api(tabela, { method:'POST', body: JSON.stringify(body) });
      msgEl.textContent = 'Publicado!'; msgEl.classList.add('ok');
      document.querySelectorAll(`#tab-${tabela} input, #tab-${tabela} textarea`).forEach(i=>i.value='');
      carregarLista(tabela);
    } catch(e){
      msgEl.textContent = 'Erro: ' + e.message; msgEl.classList.add('err');
    }
  }

  async function apagar(tabela, id){
    if(!confirm('Apagar este item?')) return;
    await api(`${tabela}?id=eq.${id}`, { method:'DELETE' });
    carregarLista(tabela);
  }

  async function carregarLista(tabela){
    const el = document.getElementById('list_'+tabela);
    try{
      const rows = await api(`${tabela}?select=*&order=created_at.desc`);
      if(!rows.length){ el.innerHTML = '<p style="color:var(--muted);font-size:13px">Nada publicado ainda.</p>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="item">
          <div>
            <h3>${r.titulo}</h3>
            <p>${(r.descricao || r.conteudo || r.link_telegram || '').toString().slice(0,80)}</p>
          </div>
          <button class="del" onclick="apagar('${tabela}','${r.id}')">Apagar</button>
        </div>
      `).join('');
    } catch(e){
      el.innerHTML = '<p style="color:var(--accent);font-size:13px">Erro ao carregar. Confira a configuração do Supabase.</p>';
    }
  }

  function carregarTudo(){
    carregarLista('promocoes');
    carregarLista('materias');
    carregarLista('downloads');
  }
  if(document.getElementById('app').style.display !== 'none'){ carregarTudo(); }
</script>
</body>
</html>
